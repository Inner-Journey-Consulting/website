# =============================================================================
# Sveltia CMS configuration — Inner Journey Consulting
# Served at /admin/. Edits content/staff.json and commits to the repo.
#
# The category lists (options:) below MUST match the arrays in js/staff.js.
# When you add a county / role / training, edit it in BOTH places.
# =============================================================================

backend:
  name: github
  repo: ORG/REPO            # <-- set to your GitHub owner/repo, e.g. inner-journey-mke/website
  branch: https://ijs.gnms6rznwv.workers.dev/callback
  # --- Authentication (choose ONE; see SETUP.md) ---
  # A) Cloudflare Worker authenticator (host-agnostic, recommended):
  #    deploy https://github.com/sveltia/sveltia-cms-auth and set:
  # base_url: https://sveltia-cms-auth.YOUR-SUBDOMAIN.workers.dev
  #
  # B) Hosting on Netlify with a GitHub OAuth app linked to the site:
  #    leave base_url unset (Netlify OAuth is the default flow).

# Uploaded photos are committed here and referenced by this relative path.
media_folder: "assets/team"
public_folder: "assets/team"

collections:
  - name: "team"
    label: "Team"
    files:
      - name: "staff"
        label: "Team Members"
        file: "content/staff.json"
        description: "Add, edit, or remove staff. Saving commits to the site and it republishes automatically."
        fields:
          - name: "staff"
            label: "Team Members"
            label_singular: "Team Member"
            widget: "list"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { name: "name", label: "Full Name", widget: "string" }
              - { name: "credentials", label: "Credentials (e.g. MSW, LCSW)", widget: "string", required: false }
              - { name: "role", label: "Role / Title (shown on the card)", widget: "string" }
              - name: "roles"
                label: "Roles"
                widget: "select"
                multiple: true
                min: 1
                options: ["Psychotherapist", "Youth/Peer Support", "Family Engagement/Psycho-Education", "Program Support"]
              - name: "trainings"
                label: "Trainings"
                widget: "select"
                multiple: true
                required: false
                options: ["EMDR", "Brainspotting", "Sensory-motor", "Jungian/Analytical"]
              - name: "counties"
                label: "Counties Served"
                widget: "select"
                multiple: true
                required: false
                options: ["Waukesha", "Ozaukee", "Dodge", "Jefferson", "Washington", "Rock"]
              - { name: "photo", label: "Photo", widget: "image", required: false, choose_url: false }
              - { name: "order", label: "Display Order (lower shows first)", widget: "number", required: false, value_type: "int", default: 99 }
